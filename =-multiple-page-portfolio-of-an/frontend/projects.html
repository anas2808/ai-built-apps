<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anas Mansuri - Projects</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-logo">Anas Mansuri</div>
            <ul class="nav-links">
                <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="projects.html" class="nav-link active">Projects</a></li>
                <li class="nav-item"><a href="skills.html" class="nav-link">Skills</a></li>
                <li class="nav-item"><a href="experience.html" class="nav-link">Experience</a></li>
                <li class="nav-item"><a href="contact.html" class="nav-link">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Projects Section -->
    <section class="section container">
        <h2 class="section-title">My Projects</h2>
        <div id="projects-grid" class="projects-grid">
            <!-- Project cards will be loaded here by JavaScript -->
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Anas Mansuri. All rights reserved.</p>
            <div class="social-links">
                <a href="https://www.linkedin.com/in/anas-mansuri-a63a53253" target="_blank">LinkedIn</a>
                <a href="https://github.com/AnasMansuri01" target="_blank">GitHub</a>
            </div>
        </div>
    </footer>

    <script>
        // Fetch projects from the API and render them
        document.addEventListener('DOMContentLoaded', () => {
            fetch('/api/projects')
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(projects => {
                    const projectsGrid = document.getElementById('projects-grid');
                    projects.forEach(project => {
                        const projectCard = document.createElement('div');
                        projectCard.classList.add('project-card');
                        projectCard.innerHTML = `
                            <h3>${project.title}</h3>
                            <p>${project.description}</p>
                            <div class="technologies">
                                <strong>Technologies:</strong> ${project.technologies}
                            </div>
                            <div class="project-links">
                                <a href="${project.link}" target="_blank" class="btn btn-primary">GitHub</a>
                            </div>
                        `;
                        projectsGrid.appendChild(projectCard);
                    });
                })
                .catch(error => {
                    console.error('Error fetching projects:', error);
                    const projectsGrid = document.getElementById('projects-grid');
                    projectsGrid.innerHTML = '<p class="error-message">Could not load projects. Please try again later.</p>';
                });
        });
    </script>
</body>
</html>
