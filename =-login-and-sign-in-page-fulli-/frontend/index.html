<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Glass Login</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <nav>
            <div class="nav-logo">Liquid Glass Login</div>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Projects</a></li>
                <li><a href="#">Skills</a></li>
                <li><a href="#">Experience</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
            <div class="menu-icon">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <main class="container">
        <div class="glass-card">
            <div class="card-switcher">
                <button class="toggle-login active">Login</button>
                <button class="toggle-signup">Sign Up</button>
            </div>

            <div class="form-wrapper">
                <!-- Login Form -->
                <form id="login-form" class="form active">
                    <h2>Welcome Back</h2>
                    <div class="input-group">
                        <input type="email" id="login-email" required autocomplete="off">
                        <label for="login-email">Email</label>
                        <span class="error-message" id="login-email-error"></span>
                    </div>
                    <div class="input-group">
                        <input type="password" id="login-password" required autocomplete="off">
                        <label for="login-password">Password</label>
                        <span class="error-message" id="login-password-error"></span>
                    </div>
                    <button type="submit" class="submit-btn">Login</button>
                    <div id="login-response-message" class="response-message"></div>
                </form>

                <!-- Sign Up Form -->
                <form id="signup-form" class="form">
                    <h2>Create Account</h2>
                    <div class="input-group">
                        <input type="text" id="signup-name" required autocomplete="off">
                        <label for="signup-name">Name</label>
                        <span class="error-message" id="signup-name-error"></span>
                    </div>
                    <div class="input-group">
                        <input type="email" id="signup-email" required autocomplete="off">
                        <label for="signup-email">Email</label>
                        <span class="error-message" id="signup-email-error"></span>
                    </div>
                    <div class="input-group">
                        <input type="password" id="signup-password" required autocomplete="off">
                        <label for="signup-password">Password</label>
                        <span class="error-message" id="signup-password-error"></span>
                    </div>
                    <div class="input-group">
                        <input type="password" id="signup-confirm-password" required autocomplete="off">
                        <label for="signup-confirm-password">Confirm Password</label>
                        <span class="error-message" id="signup-confirm-password-error"></span>
                    </div>
                    <button type="submit" class="submit-btn">Sign Up</button>
                    <div id="signup-response-message" class="response-message"></div>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2023 Liquid Glass Login. All rights reserved.</p>
            <div class="footer-links">
                <a href="#">Privacy Policy</a>
                <a href="#">Terms of Service</a>
            </div>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
