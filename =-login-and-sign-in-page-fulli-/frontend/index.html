<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiquidGlassAuth - Login & Signup</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="navbar-logo">LiquidGlassAuth</div>
            <ul class="navbar-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Projects</a></li>
                <li><a href="#">Skills</a></li>
                <li><a href="#">Experience</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
            <div class="navbar-toggle">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </nav>
    </header>

    <main class="container">
        <div class="glass-container">
            <div class="form-box active" id="login-box">
                <h2 class="form-title">Login</h2>
                <form id="login-form">
                    <div class="input-group">
                        <input type="email" id="login-email" required autocomplete="off">
                        <label for="login-email">Email</label>
                        <span class="error-message" id="login-email-error"></span>
                    </div>
                    <div class="input-group">
                        <input type="password" id="login-password" required autocomplete="off">
                        <label for="login-password">Password</label>
                        <span class="error-message" id="login-password-error"></span>
                    </div>
                    <button type="submit" class="submit-button">Login</button>
                    <p class="switch-form-text">Don't have an account? <a href="#" id="show-signup">Sign Up</a></p>
                </form>
            </div>

            <div class="form-box" id="signup-box">
                <h2 class="form-title">Sign Up</h2>
                <form id="signup-form">
                    <div class="input-group">
                        <input type="text" id="signup-username" required autocomplete="off">
                        <label for="signup-username">Username</label>
                        <span class="error-message" id="signup-username-error"></span>
                    </div>
                    <div class="input-group">
                        <input type="email" id="signup-email" required autocomplete="off">
                        <label for="signup-email">Email</label>
                        <span class="error-message" id="signup-email-error"></span>
                    </div>
                    <div class="input-group">
                        <input type="password" id="signup-password" required autocomplete="off">
                        <label for="signup-password">Password</label>
                        <span class="error-message" id="signup-password-error"></span>
                    </div>
                    <div class="input-group">
                        <input type="password" id="signup-confirm-password" required autocomplete="off">
                        <label for="signup-confirm-password">Confirm Password</label>
                        <span class="error-message" id="signup-confirm-password-error"></span>
                    </div>
                    <button type="submit" class="submit-button">Sign Up</button>
                    <p class="switch-form-text">Already have an account? <a href="#" id="show-login">Login</a></p>
                </form>
            </div>
            
            <div class="loading-overlay" id="loading-overlay">
                <div class="spinner"></div>
            </div>
            <div class="message-box" id="message-box"></div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2023 LiquidGlassAuth. All rights reserved.</p>
    </footer>

    <script src="animations.js"></script>
</body>
</html>
