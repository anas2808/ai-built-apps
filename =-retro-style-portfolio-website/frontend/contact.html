<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anas Mansuri - Contact</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
</head>
<body class="background-primary text-color-primary font-family-primary">

    <header>
        <nav class="navbar background-secondary text-color-primary">
            <ul>
                <li><a href="index.html" class="text-color-primary">Home</a></li>
                <li><a href="projects.html" class="text-color-primary">Projects</a></li>
                <li><a href="skills.html" class="text-color-primary">Skills</a></li>
                <li><a href="experience.html" class="text-color-primary">Experience</a></li>
                <li><a href="contact.html" class="text-color-primary">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section class="cmd-section">
            <div class="cmd-prompt">
                <span class="prompt-char">></span>
                <span class="prompt-text">Send me a message!</span>
            </div>
            <div class="cmd-output">
                <form id="contact-form" class="contact-form">
                    <div class="form-group">
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" required class="background-primary text-color-primary border-primary">
                    </div>
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required class="background-primary text-color-primary border-primary">
                    </div>
                    <div class="form-group">
                        <label for="message">Message:</label>
                        <textarea id="message" name="message" rows="5" required class="background-primary text-color-primary border-primary"></textarea>
                    </div>
                    <button type="submit" class="btn background-primary text-color-primary border-primary">Send</button>
                </form>
                <div id="form-status" class="text-color-primary"></div>
            </div>
        </section>
    </main>

    <footer class="background-secondary text-color-primary">
        <p>&copy; 2023 Anas Mansuri</p>
    </footer>

    <script src="js/scripts.js"></script>
</body>
</html>
