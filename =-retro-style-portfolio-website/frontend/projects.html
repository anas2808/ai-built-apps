<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anas Mansuri - Projects</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="skills.html">Skills</a></li>
                <li><a href="experience.html">Experience</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section class="cmd-section">
            <h1 class="section-title">PROJECTS</h1>
            <div id="projects-list" class="project-grid">
                <div class="project-card loading">
                    <div class="project-header">
                        <h2 class="project-title">Loading Project...</h2>
                    </div>
                    <div class="project-info">
                        <p class="project-description">Fetching project details...</p>
                    </div>
                    <div class="project-links">
                        <a href="#" class="btn-link disabled">GitHub</a>
                        <a href="#" class="btn-link disabled">Live Demo</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2023 Anas Mansuri</p>
    </footer>

    <script src="js/scripts.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const projectsListDiv = document.getElementById('projects-list');

            // Function to fetch and display projects
            async function fetchProjects() {
                try {
                    const response = await fetch('/api/projects');
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    const projects = await response.json();
                    
                    // Clear loading state
                    projectsListDiv.innerHTML = '';

                    if (projects.length === 0) {
                        projectsListDiv.innerHTML = '<p class="no-data-message">No projects found.</p>';
                        return;
                    }

                    // Display each project
                    projects.forEach(project => {
                        const projectCard = document.createElement('div');
                        projectCard.className = 'project-card';
                        
                        projectCard.innerHTML = `
                            <div class="project-header">
                                <h2 class="project-title">${project.title}</h2>
                            </div>
                            <div class="project-info">
                                <p class="project-description">${project.description}</p>
                            </div>
                            <div class="project-links">
                                <a href="${project.url}" target="_blank" class="btn-link">GitHub</a>
                                <!-- Live demo link can be added if available -->
                                <!--<a href="#" target="_blank" class="btn-link">Live Demo</a>-->
                            </div>
                        `;
                        projectsListDiv.appendChild(projectCard);
                    });
                } catch (error) {
                    console.error('Error fetching projects:', error);
                    projectsListDiv.innerHTML = '<p class="error-message">Failed to load projects. Please try again later.</p>';
                }
            }

            fetchProjects();
        });
    </script>
</body>
</html>
